# Heavy AI deps (candle, fastembed, vector index, llama.cpp bindings) land
# alongside their respective implementation modules in follow-up commits.
# Keeping the skeleton dependency-free means a stock build doesn't pay the
# AI compile-time cost just because the crate exists.
